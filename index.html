<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 书虫书店</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <h1 class="logo" onclick="window._book.filterByCategory('all')">📚 书虫书店</h1>
      <div class="auth-header" id="authContainer"></div>
      <div class="header-actions">
        <button class="header-btn" onclick="window._book.toggleWishlist()" title="收藏夹">
          ❤️ 收藏夹 <span class="wishlist-badge" id="wishlistBadge">0</span>
        </button>
        <button class="cart-btn" onclick="window._book.toggleCart()">
          🛒 购物车
          <span class="cart-badge" id="cartBadge">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- 筛选栏 -->
  <div class="filter-bar">
    <div class="container filter-inner">
      <button class="type-btn active" data-cat="all" onclick="window._book.filterByCategory('all')">全部</button>
      <button class="type-btn" data-cat="文学" onclick="window._book.filterByCategory('文学')">📕 文学</button>
      <button class="type-btn" data-cat="小说" onclick="window._book.filterByCategory('小说')">📖 小说</button>
      <button class="type-btn" data-cat="科幻" onclick="window._book.filterByCategory('科幻')">📗 科幻</button>
      <button class="type-btn" data-cat="科技" onclick="window._book.filterByCategory('科技')">📗 科技</button>
      <button class="type-btn" data-cat="儿童" onclick="window._book.filterByCategory('儿童')">📖 儿童</button>
      <button class="type-btn" data-cat="历史" onclick="window._book.filterByCategory('历史')">📘 历史</button>
      <button class="type-btn" data-cat="社科" onclick="window._book.filterByCategory('社科')">📘 社科</button>
      <button class="type-btn" data-cat="fav" onclick="window._book.filterByCategory('fav')">❤️ 收藏</button>
      <button class="search-toggle-btn" onclick="window._book.toggleSearch()" title="搜索 (Ctrl+F)">🔍</button>
    </div>
  </div>

  <!-- 搜索与高级筛选 -->
  <div class="search-bar" id="searchBar">
    <div class="container search-inner">
      <div class="search-row">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索书名或作者..." />
        <button class="search-clear" id="searchClear" onclick="window._book.clearSearch()">✕</button>
      </div>
      <div class="filter-row">
        <div class="price-range">
          <input type="number" class="price-input" id="priceMin" placeholder="最低价" min="0" />
          <span class="price-sep">—</span>
          <input type="number" class="price-input" id="priceMax" placeholder="最高价" min="0" />
        </div>
        <select class="sort-select" id="sortSelect">
          <option value="default">默认排序</option>
          <option value="price-asc">价格从低到高</option>
          <option value="price-desc">价格从高到低</option>
          <option value="name">书名 A-Z</option>
          <option value="stock">库存从多到少</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Specials Banner -->
  <div class="specials-banner" id="specialsBanner"></div>

  <!-- 商品列表 -->
  <main class="container">
    <!-- 最近浏览 -->
    <div class="recently-viewed" id="recentlyViewed">
      <div class="rv-header">
        <h3 class="rv-title">🕐 最近浏览</h3>
        <button class="rv-clear-btn" onclick="window._book.clearRecentlyViewed()">清空</button>
      </div>
      <div class="rv-track" id="rvTrack"></div>
    </div>
    <div class="product-grid" id="productGrid"></div>
  </main>

  <!-- 购物车遮罩 -->
  <div class="cart-overlay" id="cartOverlay" onclick="window._book.toggleCart()"></div>

  <!-- 购物车侧边栏 -->
  <aside class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>📚 我的购物车</h3>
      <button class="cart-close" onclick="window._book.toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>总计：</span>
        <span class="total-price" id="totalPrice">¥0.00</span>
      </div>
      <button class="btn-clear" onclick="window._book.clearCart()">清空购物车</button>
      <button class="btn-checkout" id="checkoutBtn" onclick="window._book.openCheckout()">去结算</button>
    </div>
  </aside>

  <!-- 收藏夹遮罩 -->
  <div class="cart-overlay" id="wishlistOverlay" onclick="window._book.toggleWishlist()"></div>

  <!-- 收藏夹侧边栏 -->
  <aside class="cart-sidebar" id="wishlistSidebar">
    <div class="cart-header">
      <h3>❤️ 我的收藏夹</h3>
      <button class="cart-close" onclick="window._book.toggleWishlist()">✕</button>
    </div>
    <div class="cart-items" id="wishlistItems"></div>
  </aside>

  <!-- 结算弹窗 -->
  <div class="modal-overlay" id="modalOverlay" onclick="window._book.closeCheckout()"></div>
  <div class="modal checkout-modal" id="checkoutModal">
    <div class="modal-header">
      <h3>📋 填写订单信息</h3>
      <button class="modal-close" onclick="window._book.closeCheckout()">✕</button>
    </div>
    <form class="checkout-form" id="checkoutForm" onsubmit="window._book.submitOrder(event)">
      <div class="form-group">
        <label for="userName">姓名 <span class="required">*</span></label>
        <input type="text" id="userName" placeholder="请输入收货人姓名" maxlength="20">
        <span class="error-msg" id="errorName"></span>
      </div>
      <div class="form-group">
        <label for="userPhone">手机号 <span class="required">*</span></label>
        <input type="tel" id="userPhone" placeholder="请输入11位手机号" maxlength="11">
        <span class="error-msg" id="errorPhone"></span>
      </div>
      <div class="form-group">
        <label for="userAddress">收货地址 <span class="required">*</span></label>
        <textarea id="userAddress" placeholder="请输入详细收货地址" rows="2" maxlength="100"></textarea>
        <span class="error-msg" id="errorAddress"></span>
      </div>
      <!-- 商品定制 -->
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="giftWrapCheck" onchange="window._book.toggleGiftWrap()"> 🎁 礼品包装 <span class="gift-wrap-fee">（+¥5.00）</span>
        </label>
      </div>
      <div class="form-group">
        <label for="orderNote">订单备注</label>
        <textarea id="orderNote" placeholder="如有特殊要求请在此备注..." rows="2" maxlength="200"></textarea>
      </div>
      <div class="form-summary">
        <p>共 <strong id="summaryCount">0</strong> 件商品，合计：<strong id="summaryTotal">¥0.00</strong></p>
        <p class="summary-gift" id="summaryGift" style="display:none">礼品包装：<strong>+¥5.00</strong></p>
        <p class="summary-final">总计：<strong id="summaryGrandTotal">¥0.00</strong></p>
      </div>
      <button type="submit" class="btn-submit">确认提交订单</button>
    </form>
  </div>

  <!-- 订单成功弹窗 -->
  <div class="modal-overlay" id="successOverlay" onclick="window._book.closeSuccess()"></div>
  <div class="modal success-modal" id="successModal">
    <div class="success-icon">🎉</div>
    <h3>下单成功！</h3>
    <p class="order-no" id="orderNo">订单编号：—</p>
    <div class="order-items" id="orderItems"></div>
    <p class="success-tip">感谢您的惠顾，书香将伴您前行！</p>
    <div id="successActions" style="display:none"></div>
    <button class="btn-submit" onclick="window._book.closeSuccess()">继续阅读</button>
  </div>

  <!-- ===== Order History Modal ===== -->
  <div class="modal-overlay" id="orderHistoryOverlay" onclick="window._book.closeOrderHistory()"></div>
  <div class="modal order-history-modal" id="orderHistoryModal">
    <div class="modal-header">
      <h3>📋 我的订单</h3>
      <button class="btn-clear-history" onclick="window._book.clearOrders()">清空</button>
      <button class="modal-close" onclick="window._book.closeOrderHistory()">✕</button>
    </div>
    <div class="order-history-list" id="orderHistoryList"></div>
  </div>

  <!-- ===== Profile Modal ===== -->
  <div class="modal-overlay" id="profileOverlay" onclick="window._book.closeProfile()"></div>
  <div class="modal auth-modal" id="profileModal">
    <div class="modal-header">
      <h3>👤 个人资料</h3>
      <button class="modal-close" onclick="window._book.closeProfile()">✕</button>
    </div>
    <form class="auth-form" id="profileForm" onsubmit="window._book.submitProfile(event)">
      <div class="form-group">
        <label for="profileName">姓名 <span class="required">*</span></label>
        <input type="text" id="profileName" placeholder="请输入收货人姓名" maxlength="20">
      </div>
      <div class="form-group">
        <label for="profilePhone">手机号</label>
        <input type="tel" id="profilePhone" placeholder="请输入11位手机号" maxlength="11">
      </div>
      <div class="form-group">
        <label for="profileAddress">默认收货地址</label>
        <textarea id="profileAddress" placeholder="请输入默认收货地址" rows="2" maxlength="100"></textarea>
      </div>
      <button type="submit" class="btn-submit">保存资料</button>
    </form>
  </div>

  <!-- ===== Login Modal ===== -->
  <div class="modal-overlay" id="loginOverlay" onclick="window._book.closeLogin()"></div>
  <div class="modal auth-modal" id="loginModal">
    <div class="modal-header">
      <h3>🔑 登录</h3>
      <button class="modal-close" onclick="window._book.closeLogin()">✕</button>
    </div>
    <form class="auth-form" id="loginForm" onsubmit="window._book.submitLogin(event)">
      <div class="form-group">
        <label for="loginUsername">用户名 <span class="required">*</span></label>
        <input type="text" id="loginUsername" placeholder="请输入用户名" maxlength="20" required>
      </div>
      <div class="form-group">
        <label for="loginPassword">密码 <span class="required">*</span></label>
        <input type="password" id="loginPassword" placeholder="请输入密码" maxlength="30" required>
      </div>
      <button type="submit" class="btn-submit">登录</button>
      <p class="auth-switch">
        还没有账号？<a href="javascript:void(0)" onclick="window._book.closeLogin();window._book.openRegister()">立即注册</a>
      </p>
    </form>
  </div>

  <!-- ===== Register Modal ===== -->
  <div class="modal-overlay" id="registerOverlay" onclick="window._book.closeRegister()"></div>
  <div class="modal auth-modal" id="registerModal">
    <div class="modal-header">
      <h3>📝 注册</h3>
      <button class="modal-close" onclick="window._book.closeRegister()">✕</button>
    </div>
    <form class="auth-form" id="registerForm" onsubmit="window._book.submitRegister(event)">
      <div class="form-group">
        <label for="regUsername">用户名 <span class="required">*</span></label>
        <input type="text" id="regUsername" placeholder="请输入用户名（至少2个字符）" maxlength="20" required>
      </div>
      <div class="form-group">
        <label for="regPassword">密码 <span class="required">*</span></label>
        <input type="password" id="regPassword" placeholder="请输入密码（至少6个字符）" maxlength="30" required>
      </div>
      <div class="form-group">
        <label for="regConfirmPassword">确认密码 <span class="required">*</span></label>
        <input type="password" id="regConfirmPassword" placeholder="请再次输入密码" maxlength="30" required>
      </div>
      <button type="submit" class="btn-submit">注册</button>
      <p class="auth-switch">
        已有账号？<a href="javascript:void(0)" onclick="window._book.closeRegister();window._book.openLogin()">立即登录</a>
      </p>
    </form>
  </div>

  <!-- ===== Staff Login Modal ===== -->
  <div class="modal-overlay" id="staffLoginOverlay" onclick="window._book.closeStaffLogin()"></div>
  <div class="modal auth-modal" id="staffLoginModal">
    <div class="modal-header">
      <h3>🔧 员工登录</h3>
      <button class="modal-close" onclick="window._book.closeStaffLogin()">✕</button>
    </div>
    <form class="auth-form" onsubmit="window._book.submitStaffLogin(event)">
      <div class="form-group">
        <label for="staffLoginPwd">员工密码 <span class="required">*</span></label>
        <input type="password" id="staffLoginPwd" placeholder="请输入员工密码" maxlength="30">
      </div>
      <button type="submit" class="btn-submit">登录</button>
    </form>
  </div>

  <!-- ===== Staff Dashboard Modal ===== -->
  <div class="modal-overlay" id="staffDashboardOverlay" onclick="window._book.closeStaffDashboard()"></div>
  <div class="modal staff-dashboard-modal" id="staffDashboardModal">
    <div class="modal-header">
      <h3>📊 员工管理台</h3>
      <button class="modal-close" onclick="window._book.closeStaffDashboard()">✕</button>
    </div>
    <div class="staff-order-list" id="staffOrderList"></div>
  </div>

  <!-- ===== Stock Management Modal ===== -->
  <div class="modal-overlay" id="stockOverlay" onclick="window._book.closeStockManager()"></div>
  <div class="modal stock-modal" id="stockModal">
    <div class="modal-header">
      <h3>📦 库存管理</h3>
      <button class="modal-close" onclick="window._book.closeStockManager()">✕</button>
    </div>
    <div class="stock-list" id="stockList"></div>
  </div>

  <!-- ===== Specials Management Modal ===== -->
  <div class="modal-overlay" id="specialsOverlay" onclick="window._book.closeSpecialsManager()"></div>
  <div class="modal specials-modal" id="specialsModal">
    <div class="modal-header">
      <h3>🏷️ 特价管理</h3>
      <button class="modal-close" onclick="window._book.closeSpecialsManager()">✕</button>
    </div>
    <div class="specials-manager-list" id="specialsManagerList"></div>
    <div class="specials-add-form">
      <h4>添加特价</h4>
      <select id="specialsProduct" class="sort-select"><option value="">-- 选择商品 --</option></select>
      <select id="specialsType" class="sort-select">
        <option value="">-- 类型 --</option>
        <option value="discount">打折 (如 8 折)</option>
        <option value="fixed">直降 (减固定金额)</option>
      </select>
      <input type="number" id="specialsValue" class="search-input" placeholder="折扣/金额" min="0.1" step="0.1" style="width:100px">
      <button class="oh-reorder" onclick="window._book.addSpecial()">添加</button>
    </div>
  </div>

  <!-- ===== Admin Login Modal ===== -->
  <div class="modal-overlay" id="adminLoginOverlay" onclick="window._book.closeAdminLogin()"></div>
  <div class="modal auth-modal" id="adminLoginModal">
    <div class="modal-header">
      <h3>🔐 管理员登录</h3>
      <button class="modal-close" onclick="window._book.closeAdminLogin()">✕</button>
    </div>
    <form class="auth-form" onsubmit="window._book.submitAdminLogin(event)">
      <div class="form-group">
        <label>管理员密码 <span class="required">*</span></label>
        <input type="password" id="adminPassword" placeholder="请输入管理员密码" maxlength="30">
      </div>
      <button type="submit" class="btn-submit">登录</button>
    </form>
  </div>

  <!-- ===== Admin Dashboard Modal ===== -->
  <div class="modal-overlay" id="adminOverlay" onclick="window._book.closeAdmin()"></div>
  <div class="modal admin-modal" id="adminModal">
    <div class="modal-header">
      <h3>⚙️ 后台管理</h3>
      <button class="modal-close" onclick="window._book.closeAdmin()">✕</button>
    </div>
    <div class="admin-toolbar">
      <button class="oh-reorder" onclick="window._book.openAddProduct()">➕ 添加书籍</button>
    </div>
    <div class="admin-table-wrap">
      <table class="admin-table" id="adminTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>封面</th>
            <th>书名</th>
            <th>作者</th>
            <th>分类</th>
            <th>价格</th>
            <th>库存</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ===== Add/Edit Product Modal ===== -->
  <div class="modal-overlay" id="productFormOverlay" onclick="window._book.closeProductForm()"></div>
  <div class="modal product-form-modal" id="productFormModal">
    <div class="modal-header">
      <h3 id="productFormTitle">📖 添加书籍</h3>
      <button class="modal-close" onclick="window._book.closeProductForm()">✕</button>
    </div>
    <form class="auth-form" id="productForm" onsubmit="window._book.submitProductForm(event)">
      <input type="hidden" id="productFormId" value="">
      <div class="form-group">
        <label>书名 <span class="required">*</span></label>
        <input type="text" id="pfName" placeholder="请输入书名" required>
      </div>
      <div class="form-group">
        <label>作者 <span class="required">*</span></label>
        <input type="text" id="pfAuthor" placeholder="请输入作者" required>
      </div>
      <div class="form-group">
        <label>分类 <span class="required">*</span></label>
        <select id="pfCategory" class="sort-select" style="width:100%">
          <option value="文学">文学</option>
          <option value="小说">小说</option>
          <option value="科幻">科幻</option>
          <option value="科技">科技</option>
          <option value="儿童">儿童</option>
          <option value="历史">历史</option>
          <option value="社科">社科</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>价格 (¥) <span class="required">*</span></label>
          <input type="number" id="pfPrice" placeholder="59.00" min="0" step="0.01" required>
        </div>
        <div class="form-group">
          <label>库存 <span class="required">*</span></label>
          <input type="number" id="pfStock" placeholder="30" min="0" step="1" required>
        </div>
        <div class="form-group">
          <label>封面</label>
          <input type="text" id="pfEmoji" placeholder="📕" maxlength="2">
        </div>
      </div>
      <div class="form-group">
        <label>书籍描述</label>
        <textarea id="pfDescription" placeholder="请输入书籍简介" rows="2" maxlength="500"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>出版社</label>
          <input type="text" id="pfPublisher" placeholder="出版社" maxlength="50">
        </div>
        <div class="form-group">
          <label>出版年份</label>
          <input type="number" id="pfPublishYear" placeholder="2024" min="1900" max="2026">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>ISBN</label>
          <input type="text" id="pfIsbn" placeholder="9787020002207" maxlength="13">
        </div>
        <div class="form-group">
          <label>页数</label>
          <input type="number" id="pfPages" placeholder="300" min="1">
        </div>
      </div>
      <button type="submit" class="btn-submit" id="productFormSubmit">保存</button>
    </form>
  </div>

  <!-- ===== 书籍详情弹窗 ===== -->
  <div class="modal-overlay" id="detailOverlay" onclick="window._book.closeDetail()"></div>
  <div class="modal detail-modal" id="detailModal">
    <button class="modal-close detail-close-btn" onclick="window._book.closeDetail()">✕</button>
    <div id="detailContent"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
