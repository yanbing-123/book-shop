<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>书虫书店</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <h1 class="logo">📚 书虫书店</h1>
      <button class="cart-btn" onclick="window._book.toggleCart()">
        🛒 购物车
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
    </div>
  </header>

  <!-- 搜索栏 -->
  <div class="search-bar">
    <div class="container">
      <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜索书名..." oninput="window._book.searchBooks(this.value)">
    </div>
  </div>

  <!-- 筛选栏 -->
  <div class="filter-bar">
    <div class="container filter-inner">
      <button class="type-btn active" data-cat="all" onclick="window._book.filterByCategory('all')">全部</button>
      <button class="type-btn" data-cat="文学" onclick="window._book.filterByCategory('文学')">📕 文学</button>
      <button class="type-btn" data-cat="小说" onclick="window._book.filterByCategory('小说')">📖 小说</button>
      <button class="type-btn" data-cat="科幻" onclick="window._book.filterByCategory('科幻')">📗 科幻</button>
      <button class="type-btn" data-cat="科技" onclick="window._book.filterByCategory('科技')">📗 科技</button>
      <button class="type-btn" data-cat="儿童" onclick="window._book.filterByCategory('儿童')">📖 儿童</button>
      <button class="type-btn" data-cat="历史" onclick="window._book.filterByCategory('历史')">📘 历史</button>
      <button class="type-btn" data-cat="社科" onclick="window._book.filterByCategory('社科')">📘 社科</button>
      <button class="type-btn" data-cat="favorites" onclick="window._book.filterByCategory('favorites')">❤️ 收藏</button>
    </div>
  </div>

  <!-- 商品列表 -->
  <main class="container">
    <div class="product-grid" id="productGrid"></div>
  </main>

  <!-- 购物车遮罩 -->
  <div class="cart-overlay" id="cartOverlay" onclick="window._book.toggleCart()"></div>

  <!-- 购物车侧边栏 -->
  <aside class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>📚 我的购物车</h3>
      <button class="cart-close" onclick="window._book.toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>总计：</span>
        <span class="total-price" id="totalPrice">¥0.00</span>
      </div>
      <button class="btn-clear" onclick="window._book.clearCart()">清空购物车</button>
      <button class="btn-checkout" id="checkoutBtn" onclick="window._book.openCheckout()">去结算</button>
    </div>
  </aside>

  <!-- 结算弹窗 -->
  <div class="modal-overlay" id="modalOverlay" onclick="window._book.closeCheckout()"></div>
  <div class="modal checkout-modal" id="checkoutModal">
    <div class="modal-header">
      <h3>📋 填写订单信息</h3>
      <button class="modal-close" onclick="window._book.closeCheckout()">✕</button>
    </div>
    <form class="checkout-form" id="checkoutForm" onsubmit="window._book.submitOrder(event)">
      <div class="form-group">
        <label for="userName">姓名 <span class="required">*</span></label>
        <input type="text" id="userName" placeholder="请输入收货人姓名" maxlength="20">
        <span class="error-msg" id="errorName"></span>
      </div>
      <div class="form-group">
        <label for="userPhone">手机号 <span class="required">*</span></label>
        <input type="tel" id="userPhone" placeholder="请输入11位手机号" maxlength="11">
        <span class="error-msg" id="errorPhone"></span>
      </div>
      <div class="form-group">
        <label for="userAddress">收货地址 <span class="required">*</span></label>
        <textarea id="userAddress" placeholder="请输入详细收货地址" rows="2" maxlength="100"></textarea>
        <span class="error-msg" id="errorAddress"></span>
      </div>
      <div class="form-summary">
        <p>共 <strong id="summaryCount">0</strong> 件商品，合计：<strong id="summaryTotal">¥0.00</strong></p>
      </div>
      <button type="submit" class="btn-submit">确认提交订单</button>
    </form>
  </div>

  <!-- 订单成功弹窗 -->
  <div class="modal-overlay" id="successOverlay" onclick="window._book.closeSuccess()"></div>
  <div class="modal success-modal" id="successModal">
    <div class="success-icon">🎉</div>
    <h3>下单成功！</h3>
    <p class="order-no" id="orderNo">订单编号：—</p>
    <div class="order-items" id="orderItems"></div>
    <p class="success-tip">感谢您的惠顾，书香将伴您前行！</p>
    <button class="btn-submit" onclick="window._book.closeSuccess()">继续阅读</button>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
